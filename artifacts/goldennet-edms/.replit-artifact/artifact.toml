kind = "web"
previewPath = "/"
title = "GoldenNet EDMS"
version = "1.0.0"
id = "artifacts/goldennet-edms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23511
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/goldennet-edms run dev"

[services.env]
PORT = "23511"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/goldennet-edms", "run", "build"]
publicDir = "artifacts/goldennet-edms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
